<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD WebSocket 演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            transition: background 0.3s;
        }
        .status-dot.connected {
            background: #28a745;
        }
        .status-text {
            font-weight: 500;
            color: #495057;
        }
        .content {
            padding: 30px;
        }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .message-log {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .message {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            word-wrap: break-word;
        }
        .message.sent {
            background: rgba(102, 126, 234, 0.2);
            border-left: 3px solid #667eea;
            color: #a8d5ff;
        }
        .message.received {
            background: rgba(40, 167, 69, 0.2);
            border-left: 3px solid #28a745;
            color: #98fb98;
        }
        .message.error {
            background: rgba(220, 53, 69, 0.2);
            border-left: 3px solid #dc3545;
            color: #ff6b6b;
        }
        .message.info {
            background: rgba(255, 193, 7, 0.2);
            border-left: 3px solid #ffc107;
            color: #ffe082;
        }
        .message-time {
            color: #6c757d;
            font-size: 11px;
            margin-right: 8px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-group input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .stat-card {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 CAD WebSocket 演示</h1>
            <p>实时边缘追踪与缺口检测</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">未连接</span>
            </div>
            <div>
                <button class="btn btn-primary" id="connectBtn" onclick="toggleConnection()">
                    连接
                </button>
            </div>
        </div>

        <div class="content">
            <div class="control-panel">
                <button class="btn btn-success" onclick="sendPing()" disabled id="pingBtn">
                    🏓 发送 Ping
                </button>
                <button class="btn btn-primary" onclick="selectEdge()" disabled id="selectEdgeBtn">
                    📐 选择边缘 (ID: 0)
                </button>
                <button class="btn btn-primary" onclick="detectGaps()" disabled id="detectGapsBtn">
                    🔍 检测缺口
                </button>
                <button class="btn btn-secondary" onclick="clearLog()">
                    🗑️ 清空日志
                </button>
            </div>

            <div class="input-group">
                <input type="number" id="edgeIdInput" placeholder="边缘 ID" value="0" min="0">
                <input type="number" id="toleranceInput" placeholder="公差 (mm)" value="0.5" step="0.1" min="0">
            </div>

            <div class="message-log" id="messageLog"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="sentCount">0</div>
                    <div class="stat-label">发送消息</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="receivedCount">0</div>
                    <div class="stat-label">接收消息</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="errorCount">0</div>
                    <div class="stat-label">错误次数</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let sentCount = 0;
        let receivedCount = 0;
        let errorCount = 0;

        const WS_URL = 'ws://localhost:3000/ws';

        function updateStats() {
            document.getElementById('sentCount').textContent = sentCount;
            document.getElementById('receivedCount').textContent = receivedCount;
            document.getElementById('errorCount').textContent = errorCount;
        }

        function addLog(message, type = 'info') {
            const log = document.getElementById('messageLog');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            const time = new Date().toLocaleTimeString('zh-CN');
            div.innerHTML = `<span class="message-time">[${time}]</span>${message}`;
            
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('connectBtn');
            const actionBtns = ['pingBtn', 'selectEdgeBtn', 'detectGapsBtn'];
            
            if (connected) {
                dot.classList.add('connected');
                text.textContent = '已连接';
                btn.textContent = '断开';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-secondary');
                actionBtns.forEach(id => {
                    document.getElementById(id).disabled = false;
                });
            } else {
                dot.classList.remove('connected');
                text.textContent = '未连接';
                btn.textContent = '连接';
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-primary');
                actionBtns.forEach(id => {
                    document.getElementById(id).disabled = true;
                });
            }
        }

        function toggleConnection() {
            if (ws) {
                ws.close();
            } else {
                connect();
            }
        }

        function connect() {
            addLog(`正在连接到 ${WS_URL}...`, 'info');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = function(event) {
                    addLog('✅ WebSocket 连接成功！', 'info');
                    updateStatus(true);
                    
                    // 自动发送 ping
                    setTimeout(() => sendPing(), 500);
                };
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        receivedCount++;
                        updateStats();
                        
                        let message = '';
                        switch(data.type) {
                            case 'connected':
                                message = `🔌 已连接，会话 ID: ${data.session_id}`;
                                break;
                            case 'edge_selected':
                                message = `📐 边缘选中：ID ${data.edge_id}`;
                                break;
                            case 'trace_result':
                                message = `🔍 追踪结果：${data.edges.length} 条边，闭环：${data.loop_closed}`;
                                if (data.edges.length <= 10) {
                                    message += ` [${data.edges.join(', ')}]`;
                                }
                                break;
                            case 'gaps_detected':
                                message = `⚠️ 检测到 ${data.gaps.length} 个缺口`;
                                data.gaps.forEach((gap, i) => {
                                    message += `\n   - 缺口 ${i+1}: ${gap.start_point?.join(', ')} → ${gap.end_point?.join(', ')}`;
                                });
                                break;
                            case 'error':
                                message = `❌ 错误：${data.message}`;
                                addLog(message, 'error');
                                return;
                            case 'pong':
                                message = '🏓 Pong (心跳响应)';
                                break;
                            default:
                                message = `📨 收到消息：${JSON.stringify(data)}`;
                        }
                        
                        addLog(message, 'received');
                    } catch (e) {
                        addLog(`解析消息失败：${e.message}`, 'error');
                        errorCount++;
                        updateStats();
                    }
                };
                
                ws.onerror = function(error) {
                    addLog(`❌ WebSocket 错误：${error}`, 'error');
                    errorCount++;
                    updateStats();
                };
                
                ws.onclose = function(event) {
                    addLog(`🔌 连接已关闭 (代码：${event.code})`, 'info');
                    ws = null;
                    updateStatus(false);
                };
            } catch (e) {
                addLog(`连接失败：${e.message}`, 'error');
                errorCount++;
                updateStats();
            }
        }

        function sendMessage(data) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('❌ 未连接到 WebSocket 服务器', 'error');
                return false;
            }
            
            try {
                ws.send(JSON.stringify(data));
                sentCount++;
                updateStats();
                addLog(`📤 发送：${JSON.stringify(data)}`, 'sent');
                return true;
            } catch (e) {
                addLog(`发送失败：${e.message}`, 'error');
                errorCount++;
                updateStats();
                return false;
            }
        }

        function sendPing() {
            sendMessage({ type: 'ping' });
        }

        function selectEdge() {
            const edgeId = parseInt(document.getElementById('edgeIdInput').value) || 0;
            sendMessage({ 
                type: 'select_edge',
                edge_id: edgeId
            });
        }

        function detectGaps() {
            const tolerance = parseFloat(document.getElementById('toleranceInput').value) || 0.5;
            sendMessage({
                type: 'detect_gaps',
                tolerance: tolerance
            });
        }

        function clearLog() {
            document.getElementById('messageLog').innerHTML = '';
            addLog('🗑️ 日志已清空', 'info');
        }

        // 初始化
        updateStatus(false);
        addLog('💡 提示：点击"连接"按钮开始 WebSocket 通信', 'info');
    </script>
</body>
</html>
