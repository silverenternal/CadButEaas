# OpenCV vcpkg 配置
# 如果系统使用 vcpkg 安装 OpenCV，启用此配置

# Windows vcpkg 配置
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-L", "C:\\vcpkg\\installed\\x64-windows\\lib",
    "-L", "C:\\vcpkg\\installed\\x64-windows\\debug\\lib",
]

[env]
# OpenCV 目录（vcpkg 安装）
OPENCV_DIR = "C:\\vcpkg\\installed\\x64-windows"
# 或者使用 OpenCV 源码目录（如果 vcpkg 不工作）
# OPENCV_LINK_LIBS = "opencv_world4"
# OPENCV_LINK_PATHS = "C:\\vcpkg\\installed\\x64-windows\\lib"
# OPENCV_INCLUDE_PATHS = "C:\\vcpkg\\installed\\x64-windows\\include"
