# CAD EaaS 架构 Prometheus 告警规则

groups:
  - name: cad_eaas_alerts
    interval: 5s
    rules:
      # 阶段超时率过高告警
      - alert: HighStageTimeoutRate
        expr: rate(stage_timeout_total[5m]) / (rate(stage_completed_total[5m]) + rate(stage_timeout_total[5m]) + rate(stage_cancel_total[5m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "阶段 {{ $labels.stage_name }} 超时率过高"
          description: "阶段 {{ $labels.stage_name }} 的超时率为 {{ $value | humanizePercentage }} (阈值：10%)"

      # 阶段取消率过高告警
      - alert: HighStageCancelRate
        expr: rate(stage_cancel_total[5m]) / (rate(stage_completed_total[5m]) + rate(stage_timeout_total[5m]) + rate(stage_cancel_total[5m])) > 0.2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "阶段 {{ $labels.stage_name }} 取消率过高"
          description: "阶段 {{ $labels.stage_name }} 的取消率为 {{ $value | humanizePercentage }} (阈值：20%)"

      # 阶段耗时 P99 过高告警
      - alert: HighStageLatencyP99
        expr: histogram_quantile(0.99, rate(stage_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "阶段 {{ $labels.stage_name }} P99 耗时过高"
          description: "阶段 {{ $labels.stage_name }} 的 P99 耗时为 {{ $value | humanizeDuration }} (阈值：2s)"

      # 阶段完全停止告警
      - alert: StageStopped
        expr: rate(stage_completed_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "阶段 {{ $labels.stage_name }} 可能已停止"
          description: "阶段 {{ $labels.stage_name }} 在过去 5 分钟内没有完成任何请求"

      # 零拷贝性能回归告警（如果使用性能指标）
      - alert: ZeroCopyPerformanceDegradation
        expr: arc_clone_1mb_duration_seconds > 0.0001  # 100μs
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "零拷贝性能可能退化"
          description: "Arc::clone() 1MB 数据耗时 {{ $value | humanizeDuration }} > 100μs"
