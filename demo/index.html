<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD 解析器演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #eef2ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #333;
        }

        .file-size {
            color: #666;
            font-size: 0.9rem;
        }

        .parse-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .parse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .parse-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eef2ff;
        }

        .results-header h2 {
            color: #333;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .entity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entity-item {
            padding: 12px 15px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entity-type {
            font-weight: 600;
            color: #333;
        }

        .entity-layer {
            color: #666;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .note strong {
            color: #856404;
        }

        .note p {
            color: #856404;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 CAD 解析器演示</h1>
            <p>支持 DXF / 矢量 PDF 文件解析</p>
        </header>

        <section class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击或拖拽文件到此处</div>
                <div class="upload-hint">支持 .dxf 和 .pdf 格式（矢量 PDF）</div>
            </div>
            <input type="file" id="fileInput" accept=".dxf,.pdf">

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <button class="parse-btn" id="parseBtn" disabled>开始解析</button>

            <div class="note">
                <strong>⚠️ 注意：</strong>
                <p>扫描版 PDF（图片型）暂不支持，请先转换为 DXF 格式。</p>
            </div>
        </section>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在解析文件，请稍候...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <section class="results-section" id="results">
            <div class="results-header">
                <h2>📊 解析结果</h2>
                <span class="status-badge status-success" id="statusBadge">解析成功</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalEntities">0</div>
                    <div class="stat-label">实体总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="lineCount">0</div>
                    <div class="stat-label">直线 (LINE)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="polylineCount">0</div>
                    <div class="stat-label">多段线 (LWPOLYLINE)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="arcCount">0</div>
                    <div class="stat-label">圆弧 (ARC)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="layerCount">0</div>
                    <div class="stat-label">图层数量</div>
                </div>
            </div>

            <h3 style="margin-bottom: 15px; color: #333;">实体列表</h3>
            <div class="entity-list" id="entityList"></div>
        </section>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const parseBtn = document.getElementById('parseBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const results = document.getElementById('results');

        let selectedFile = null;

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // 拖拽处理
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;

            // 验证文件类型
            const validTypes = ['application/pdf', 'application/dxf', 'text/plain'];
            const isDXF = file.name.endsWith('.dxf');
            const isPDF = file.name.endsWith('.pdf');

            if (!isDXF && !isPDF) {
                showError('不支持的文件格式，请选择 .dxf 或 .pdf 文件');
                return;
            }

            selectedFile = file;

            // 显示文件信息
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');

            // 启用解析按钮
            parseBtn.disabled = false;

            // 隐藏之前的结果和错误
            results.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            results.classList.remove('show');
        }

        // 解析按钮点击
        parseBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 显示加载状态
            loading.classList.add('show');
            parseBtn.disabled = true;
            errorMessage.classList.remove('show');
            results.classList.remove('show');

            try {
                // 模拟解析过程（实际应该调用后端 API）
                await simulateParsing(selectedFile);
            } catch (error) {
                showError('解析失败：' + error.message);
            } finally {
                loading.classList.remove('show');
                parseBtn.disabled = false;
            }
        });

        async function simulateParsing(file) {
            // 模拟延迟
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 模拟解析结果
            const mockData = generateMockData(file);

            // 显示结果
            displayResults(mockData);
        }

        function generateMockData(file) {
            // 根据文件类型生成模拟数据
            const isDXF = file.name.endsWith('.dxf');

            return {
                success: true,
                totalEntities: Math.floor(Math.random() * 200) + 50,
                lineCount: Math.floor(Math.random() * 100) + 20,
                polylineCount: Math.floor(Math.random() * 50) + 10,
                arcCount: Math.floor(Math.random() * 30) + 5,
                layerCount: Math.floor(Math.random() * 10) + 3,
                entities: generateMockEntities()
            };
        }

        function generateMockEntities() {
            const types = ['LINE', 'LWPOLYLINE', 'ARC', 'CIRCLE', 'TEXT'];
            const layers = ['WALL', 'DOOR', 'WINDOW', 'FURNITURE', 'DIMENSION', '0'];
            const entities = [];

            for (let i = 0; i < 10; i++) {
                entities.push({
                    type: types[Math.floor(Math.random() * types.length)],
                    layer: layers[Math.floor(Math.random() * layers.length)]
                });
            }

            return entities;
        }

        function displayResults(data) {
            // 更新统计
            document.getElementById('totalEntities').textContent = data.totalEntities;
            document.getElementById('lineCount').textContent = data.lineCount;
            document.getElementById('polylineCount').textContent = data.polylineCount;
            document.getElementById('arcCount').textContent = data.arcCount;
            document.getElementById('layerCount').textContent = data.layerCount;

            // 更新实体列表
            const entityList = document.getElementById('entityList');
            entityList.innerHTML = data.entities.map(e => `
                <div class="entity-item">
                    <span class="entity-type">${e.type}</span>
                    <span class="entity-layer">图层：${e.layer}</span>
                </div>
            `).join('');

            // 显示结果区域
            results.classList.add('show');
        }
    </script>
</body>
</html>
