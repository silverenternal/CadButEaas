# CAD 处理系统配置文件
# 对齐交付目标.md: 通过图层、颜色、线宽规则过滤候选墙线

[parser.dxf]
# 图层白名单（支持 AIA 标准和中文变体）
# layer_whitelist = ["WALL", "WALL-*", "A-WALL", "墙", "墙体"]

# 实体类型白名单
# entity_whitelist = ["LINE", "LWPOLYLINE", "ARC", "CIRCLE"]

# 颜色白名单 (ACI 索引 1-255)
# 1=红色，7=黑色
# color_whitelist = [1, 7]

# 线宽白名单 (DXF 枚举值，非 mm 单位)
# 枚举值映射：-3..=-1=BYLAYER/BYBLOCK/DEFAULT, 0=0.00mm, 7=0.25mm, 8=0.30mm, 9=0.35mm, 10=0.40mm, 11=0.50mm, 21=2.11mm
# 示例：过滤 0.25mm-0.50mm 的墙线
# lineweight_whitelist = [7, 8, 9, 10, 11]

# ARC 离散化容差 (mm) - 弦高误差
arc_tolerance_mm = 0.1

# SPLINE 离散化容差 (mm) - 弦高误差
spline_tolerance_mm = 0.1

# 忽略注释性实体
ignore_text = true
ignore_dimensions = true
ignore_hatch = true

[parser.pdf]
# 矢量化容差 (像素)
vectorize_tolerance_px = 1.0

# 边缘检测阈值 (0.0-1.0)
edge_threshold = 0.1

# 最小线段长度 (像素)
min_line_length_px = 5.0

[topology]
# 端点吸附容差 (mm) - 合并距离 < ε 的端点
snap_tolerance_mm = 0.5

# 最小线段长度 (mm) - 移除短边/碎线
min_line_length_mm = 1.0

# 共线合并角度容差 (度)
merge_angle_tolerance_deg = 5.0

# 最大间隙桥接长度 (mm) - 自动补全缺口
max_gap_bridge_length_mm = 2.0

# Halfedge 结构支持（P11 锐评落实）
# true = 使用 Halfedge 数据结构（支持面枚举、孔洞遍历）
# false = 使用邻接表遍历（默认，兼容现有流程）
use_halfedge = false

# 跳过交点检测（P11 性能优化）
# true = 跳过交点检测和切分，适用于已清理的 DXF 文件（性能提升 10x+）
# false = 执行完整的交点检测（默认，处理复杂图纸）
# 注意：对于包含大量交叉墙体的图纸，跳过此步骤可能导致拓扑错误
skip_intersection_check = false

[validator]
# 闭合性检查容差 (mm) - 首尾距离
closure_tolerance_mm = 0.5

# 最小面积 (m²) - 过滤过小区域
min_area_m2 = 1.0

# 最短边检查 (mm) - 质量检查
min_edge_length_mm = 10.0

# 最小角度检查 (度) - 避免尖角
min_angle_deg = 15.0

[export]
# 导出格式：json 或 bincode
format = "json"

# JSON 缩进空格数
json_indent = 2

# 导出前自动验证
auto_validate = true
